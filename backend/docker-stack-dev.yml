services:
  postgres:
    image: postgres:latest
    container_name: nortech-postgres-dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nortech-backend-dev
    env_file: .env
    environment:
      NODE_ENV: development
      DB_HOST: postgres
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
    command: npm run dev
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata_dev:
